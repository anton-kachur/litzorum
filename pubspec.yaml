name: litzorum
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  hive: ^2.0.4
  hive_flutter: ^1.1.0
  path_provider: ^2.0.2
  cupertino_icons: ^1.0.2
  dropdown_button2: ^2.1.4
  intl: ^0.18.1
  audioplayers: ^6.6.0
  google_mlkit_translation: ^0.13.1
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.3.3
  hive_generator: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/litzorum_icon_v1.png"
  adaptive_icon_background: "#396A3E"
  adaptive_icon_foreground: "assets/icon/foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/  
    - assets/ideologies/
    - assets/fonts/
    - assets/endings/
    - assets/audio/
    - assets/sounds/
  
  fonts:
    - family: Roboto-Bold
      fonts:
        - asset: assets/fonts/Roboto-Bold.ttf
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf