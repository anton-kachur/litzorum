name: litzorum
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  hive: ^2.0.4
  hive_flutter: ^1.1.0
  path_provider: ^2.0.2
  cupertino_icons: ^1.0.2
  dropdown_button2: ^2.1.4
  intl: ^0.18.1
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.3.3
  hive_generator: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/Litzorum.png"

flutter:
  uses-material-design: true
  assets:
    - assets/  
    - assets/ideologies/
    - assets/fonts/
    - assets/endings/
    - assets/audio/
    - assets/sounds/
  
  fonts:
    - family: Monda-Bold
      fonts:
        - asset: assets/fonts/Monda-Bold.ttf
    - family: Monda
      fonts:
        - asset: assets/fonts/Monda-Regular.ttf